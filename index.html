<style>
:root{color-scheme:dark}
*{box-sizing:border-box;margin:0;padding:0}
body{font:13px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif;color:#dbe2ee;padding:16px;
  background:#0a0e17;background-image:radial-gradient(1100px 600px at 15% -10%,#16203a 0%,rgba(10,14,23,0) 60%),radial-gradient(900px 500px at 110% 10%,#1a1430 0%,rgba(10,14,23,0) 55%);background-attachment:fixed}
h1{font-size:18px;font-weight:800;letter-spacing:.02em;background:linear-gradient(90deg,#e2e8f0,#93c5fd);-webkit-background-clip:text;background-clip:text;color:transparent}
h3{font-size:11px;font-weight:700;color:#8fa3c8;text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px}
.muted{color:#6b7a95;font-size:11px}
.hdr{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:12px}
.badge{padding:5px 14px;border-radius:999px;color:#fff;font-weight:800;font-size:13px;box-shadow:0 4px 24px -4px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.25)}
.banner{background:rgba(127,29,29,.25);border:1px solid #7f1d1d;color:#fca5a5;border-radius:10px;padding:9px 13px;margin-bottom:10px;font-weight:600;font-size:12px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.card{background:linear-gradient(160deg,#151d31 0%,#0d1322 100%);border:1px solid #223052;border-radius:14px;padding:12px 14px;box-shadow:0 10px 30px -18px rgba(0,0,0,.9)}
.card .v{font-size:24px;font-weight:800;letter-spacing:-.01em}
.card .l{font-size:10px;color:#7c8aa8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tabs button{border:1px solid #223052;background:#0f1526;border-radius:999px;padding:7px 16px;font-size:12px;font-weight:700;color:#8fa3c8;cursor:pointer;transition:all .15s}
.tabs button:hover{border-color:#3b82f6;color:#cbd5e1}
.tabs button.on{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 4px 18px -4px rgba(99,102,241,.7)}
.pane{display:none}.pane.on{display:block}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:860px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}
.panel{background:rgba(15,21,38,.85);border:1px solid #1d2942;border-radius:14px;padding:12px;box-shadow:0 12px 32px -20px rgba(0,0,0,.9)}
.ch{position:relative;height:240px}
.ch.tall{height:300px}.ch.strip{height:80px}
table{width:100%;border-collapse:collapse;font-size:12px}
td,th{padding:5px 7px;border-bottom:1px solid #1c2740;text-align:right}
th{color:#7c8aa8;font-weight:600}td{color:#c4cfe2}
td:first-child,th:first-child{text-align:left}
tr:hover td{background:rgba(59,130,246,.05)}
.pos{color:#34d399;font-weight:700}.neg{color:#f87171;font-weight:700}
.note{background:rgba(10,16,30,.7);border:1px dashed #2b3a5f;border-radius:10px;padding:9px;font-size:11px;color:#8fa0bd;margin-top:8px}
input{background:#0c1220;border:1px solid #2b3a5f;color:#e2e8f0;border-radius:8px;padding:5px 7px;font-size:12px;width:90px}
.btn{border:none;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}
</style>
</head>

window.addCB=function(){const m=document.getElementById('cbm').value,v=document.getElementById('cbv').value;if(!/^\d{4}-\d{2}$/.test(m)||v==='')return alert('Use YYYY-MM and a number');const s=JSON.parse(localStorage.getItem('cbdiff')||'{}');s[m]=+v;localStorage.setItem('cbdiff',JSON.stringify(s));location.reload()};
function show(t){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='p-'+t));if(!made[t]){made[t]=1;try{init[t]()}catch(e){console.error(t,e)}}}
