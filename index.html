function tbl(grp){const P2=D.parts[grp]||[];return`<table><tr><th>Indicator</th><th>Weight %</th><th>Latest z</th><th>Contribution</th><th>As of</th></tr>${P2.map(r=>`<tr><td>${r.n}</td><td>${r.w}</td><td class="${r.z>=0?'pos':'neg'}">${r.z??'–'}</td><td class="${r.z>=0?'pos':'neg'}">${r.z==null?'–':(r.w*r.z/100).toFixed(2)}</td><td class="muted">${r.m||''}</td></tr>`).join('')}</table>`}
['labor','growth','housing','inflation'].forEach(g=>{const el=document.getElementById('t-'+g);if(el)el.innerHTML=tbl(g)});

  f(x0,top,right-x0,y0-top,'#ca8a0414');f(left,top,x0-left,y0-top,'#ea580c14');f(x0,y0,right-x0,bottom-y0,'#16a34a14');f(left,y0,x0-left,bottom-y0,'#dc262614');
  ctx.fillStyle='#64748b';ctx.font='600 10px sans-serif';ctx.textAlign='right';ctx.fillText('Q2 Expansion',right-6,top+12);ctx.fillText('Q1 Recovery',right-6,bottom-6);ctx.textAlign='left';ctx.fillText('Q3 Stagflation',left+6,top+12);ctx.fillText('Q4 Recession',left+6,bottom-6);ctx.restore()}};
 new Chart(document.getElementById('quad'),{type:'scatter',data:{datasets:[{data:pts,showLine:true,tension:.3,borderColor:'#33415577',borderWidth:1.5,pointRadius:pts.map((_,i)=>i===pts.length-1?7:2+4*i/pts.length),pointBackgroundColor:pts.map(p=>QC[p.x>=0?(p.y<0?1:2):(p.y>=0?3:4)])}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>keys[c.dataIndex]+`  g:${c.parsed.x.toFixed(2)} π:${c.parsed.y.toFixed(2)}`}}},scales:{x:{min:-R,max:R,title:{display:true,text:'Growth-axis momentum'},grid:{color:'#f1f5f9'}},y:{min:-R,max:R,title:{display:true,text:'Inflation momentum'},grid:{color:'#f1f5f9'}}}},plugins:[qbg]});
 line('recp',D.scores.recprob.d,[{p:D.scores.recprob,l:'Recession probability',c:'#dc2626',fill:true}],{y:{min:0,max:100}});

},

},

window.addCB=function(){const m=document.getElementById('cbm').value,v=document.getElementById('cbv').value;if(!/^\d{4}-\d{2}$/.test(m)||v==='')return alert('Use YYYY-MM and a number');const s=JSON.parse(localStorage.getItem('cbdiff')||'{}');s[m]=+v;localStorage.setItem('cbdiff',JSON.stringify(s));location.reload()};
function show(t){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='p-'+t));if(!made[t]){made[t]=1;try{init[t]()}catch(e){console.error(t,e)}}}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.t)show(e.target.dataset.t)});
