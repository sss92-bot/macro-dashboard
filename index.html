.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}

.tabs button:hover{border-color:#3b82f6;color:#cbd5e1}
.tabs button.on{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 4px 18px -4px rgba(99,102,241,.7)}
.pane{display:none}.pane.on{display:block}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:860px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}

#modal.on{display:flex}

 mkQuad(document.getElementById('quad'));creators['quad']=mkQuad;
 line('recp',D.scores.recprob.d,[{p:D.scores.recprob,l:'Recession probability',c:'#dc2626',fill:true}],{y:{min:0,max:100}});
 const SL=D.quad.d;const mkStrip=cv=>new Chart(cv,{type:'bar',data:{labels:SL,datasets:[{data:SL.map(()=>1),backgroundColor:D.quad.v.map(x=>QC[x]),barPercentage:1,categoryPercentage:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>QL[D.quad.v[c.dataIndex]]}}},scales:{x:{ticks:yt(SL),grid:{display:false}},y:{display:false,max:1}}},plugins:[recPlug]});
 mkStrip(document.getElementById('strip'));creators['strip']=mkStrip;
 line('axes',D.scores.gaxis.d,[{p:D.scores.gaxis,l:'Growth axis',c:'#60a5fa'},{p:D.scores.inflation,l:'Inflation',c:'#f87171'}]);
},
};
window.addCB=function(){const m=document.getElementById('cbm').value,v=document.getElementById('cbv').value;if(!/^\d{4}-\d{2}$/.test(m)||v==='')return alert('Use YYYY-MM and a number');const s=JSON.parse(localStorage.getItem('cbdiff')||'{}');s[m]=+v;localStorage.setItem('cbdiff',JSON.stringify(s));location.reload()};
let mchart=null;
function openM(id,title){document.getElementById('modal').classList.add('on');document.getElementById('mtitle').textContent=title;document.getElementById('mtable').style.display='none';document.getElementById('mch').innerHTML='<canvas id="mcanvas"></canvas>';mchart=creators[id](document.getElementById('mcanvas'))}
function closeM(){if(mchart){mchart.destroy();mchart=null}document.getElementById('modal').classList.remove('on')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeM()});
document.getElementById('mclose').onclick=closeM;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});
function readTbl(){if(!mchart)return'';const L=mchart.data.labels;let rows='';let idx=[];
 if(L&&L.length){idx=[...new Set([L.length-1,L.length-4,L.length-13].filter(i=>i>=0))];
  rows=mchart.data.datasets.filter(d=>d.label&&!(d.borderDash&&d.borderDash.length)).map(d=>'<tr><td>'+d.label+'</td>'+idx.map(i=>{let v=null;for(let j=i;j>=0;j--){if(d.data[j]!=null){v=d.data[j];break}}return '<td>'+(v==null?'–':(+v).toFixed(2))+'</td>'}).join('')+'</tr>').join('')}
 if(rows)return '<table><tr><th>Series</th>'+idx.map(i=>'<th>'+L[i]+'</th>').join('')+'</tr>'+rows+'</table>';
 const ks=D.gmom.d.filter(k=>k in im).slice(-8).reverse();const qd2=dict(D.quad);
 return '<table><tr><th>Month</th><th>Growth momentum</th><th>Inflation momentum</th><th>Regime</th></tr>'+ks.map(k=>`<tr><td>${k}</td><td class="${gm[k]>=0?'pos':'neg'}">${gm[k].toFixed(2)}</td><td class="${im[k]>=0?'pos':'neg'}">${im[k].toFixed(2)}</td><td style="color:${QC[qd2[k]]}">${QL[qd2[k]]||''}</td></tr>`).join('')+'</table>'}
document.getElementById('mread').onclick=()=>{const el=document.getElementById('mtable');if(el.style.display==='block'){el.style.display='none';return}el.innerHTML=readTbl();el.style.display='block'};
function addExp(){for(const id in creators){const cv=document.getElementById(id);if(!cv)continue;const p=cv.closest('.panel');if(!p||p.querySelector('.exp'))continue;const h=p.querySelector('h3');const b=document.createElement('button');b.className='exp';b.textContent='⤢';b.title='Enlarge';b.onclick=()=>openM(id,h?h.textContent:'');p.appendChild(b)}}
function show(t){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='p-'+t));if(!made[t]){made[t]=1;try{init[t]()}catch(e){console.error(t,e)}}addExp()}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.t)show(e.target.dataset.t)});
show('Main');
</script>
